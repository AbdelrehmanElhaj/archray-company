<section id="projects" class="section projects">
  <div class="section-inner">
    <div appReveal class="header">
      <div class="header-left">
        <div class="gold-label">
          <div class="gold-label-line"></div>
          <span class="gold-label-text">Our Work</span>
        </div>
        <h2 class="section-title">Selected Projects</h2>
        <p class="header-sub">
          A curated selection of our architecture, interior, and planning projects across the UAE and GCC.
        </p>
      </div>
      <button class="view-all-btn">VIEW ALL PROJECTS</button>
    </div>

    <div appReveal class="cards-grid">
      @for (proj of projects; track proj.title) {
        <div class="project-card">
          <div class="card-img" [style.background]="'linear-gradient(135deg,' + proj.accent + ' 0%, #091B30 100%)'">
            <svg class="wireframe" viewBox="0 0 200 180" fill="none">
              <rect x="30" y="50" width="140" height="120" stroke="white" stroke-width="1.2"/>
              <rect x="45" y="65" width="25" height="32" stroke="white" stroke-width="0.8"/>
              <rect x="80" y="65" width="25" height="32" stroke="white" stroke-width="0.8"/>
              <rect x="115" y="65" width="25" height="32" stroke="white" stroke-width="0.8"/>
              <rect x="45" y="108" width="25" height="32" stroke="white" stroke-width="0.8"/>
              <rect x="80" y="108" width="25" height="32" stroke="white" stroke-width="0.8"/>
              <rect x="115" y="108" width="25" height="32" stroke="white" stroke-width="0.8"/>
              <rect x="70" y="20" width="60" height="30" stroke="white" stroke-width="0.8"/>
              <line x1="30" y1="165" x2="170" y2="165" stroke="white" stroke-width="0.8"/>
              <line x1="70" y1="20" x2="30" y2="50" stroke="white" stroke-width="0.5"/>
              <line x1="130" y1="20" x2="170" y2="50" stroke="white" stroke-width="0.5"/>
              <line x1="185" y1="5" x2="60" y2="170" stroke="#D4AF37" stroke-width="0.9" opacity="0.7"/>
            </svg>
            <div class="overlay">
              <span class="view-label">VIEW PROJECT</span>
            </div>
            <div class="type-tag">{{ proj.type }}</div>
          </div>
          <div class="card-info">
            <div class="card-title">{{ proj.title }}</div>
            <div class="card-meta">
              <span class="card-location">{{ proj.location }}</span>
              <span class="card-year">{{ proj.year }}</span>
            </div>
          </div>
        </div>
      }
    </div>
  </div>
</section>
